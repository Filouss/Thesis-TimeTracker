# prod db configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.security.oauth2.client.registration.github.clientId=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.clientSecret=${GITHUB_CLIENT_SECRET}

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

app.frontend.url=${APP_FRONTEND_URL}
server.forward-headers-strategy=framework


#neon db has limited monthly uptime, so we disable db health check to avoid unnecessary load on the db
management.health.db.enabled=false
# disabling idle connection
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=240000
spring.datasource.hikari.max-lifetime=1800000